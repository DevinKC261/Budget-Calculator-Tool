<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css">
    <title>Budget Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html">Vaultora</a>
        <a href="profile.html">Profile</a>
      </nav>
    </header>

    <main>
      <h1>Budget Calculator</h1>

      <section id="pick-your-date">
        <!--If u don't know how to do dropdowns search it up bcuz idk either, but it uses these elements-->
        <h2>Pick Your Date:</h2>
        <select id="month">
          <option></option>
        </select>
        <select id="year">
          <option></option>
        </select>
      </section>

      <section id="calculation">
        <form>
          <ul id="inputFields">
            <li id="input-group">
              <input type="datetime" class="date-input">
              <p class="expense-title">Bi-Weekly Income</p>
              <!-- If you click this button it switches between being income or expense -->
              <button class="expense-status" type="button" data-button-id="1">Income</button>
              <input type="text" class="expense-input" value="2500">
            </li>
            <li id="input-group">
              <input type="datetime" class="date-input">
              <p class="expense-title">Housing/Mortgage</p>
              <!-- If you click this button it switches between being income or expense -->
              <button class="expense-status" type="button" data-button-id="2">Income</button>
              <input type="text" class="expense-input">
            </li>
            <li id="input-group">
              <input type="datetime" class="date-input">
              <p class="expense-title">Utilities</p>
              <!-- If you click this button it switches between being income or expense -->
              <button class="expense-status" type="button" data-button-id="3">Income</button>
              <input type="text" class="expense-input">
            </li>
            <li id="input-group">
              <input type="datetime" class="date-input">
              <p class="expense-title">Bi-Weekly Income</p>
              <!-- If you click this button it switches between being income or expense -->
              <button class="expense-status" type="button" data-button-id="4">Income</button>
              <input type="text" class="expense-input" value="2500">
            </li>
            <li id="input-group">
              <input type="datetime" class="date-input">
              <p class="expense-title">Food/Supply</p>
              <!-- If you click this button it switches between being income or expense -->
              <button class="expense-status" type="button"  data-button-id="5">Income</button>
              <input type="text" class="expense-input">
            </li>
          </ul>

          <button id="add-new" type="button">Add Category?</button>
          <button id="finish-button" type="submit">Finish</button>
        </form>
      </section>
      <section id="chart"></section>
    </main>
    <script type="module" src="scripts.js"></script>
  </body>
</html>
